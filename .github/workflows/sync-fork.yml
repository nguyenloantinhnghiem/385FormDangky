# Tự động cập nhật fork theo repo gốc
# Chạy mỗi ngày lúc 2:00 sáng UTC (9:00 sáng VN)
# Người clone chỉ cần bật Actions 1 lần → fork tự cập nhật mãi mãi

name: 🔄 Tự động cập nhật từ bản gốc

on:
  schedule:
    - cron: '0 2 * * *'   # Mỗi ngày lúc 2:00 UTC = 9:00 VN
  workflow_dispatch:       # Cho phép chạy thủ công

jobs:
  sync:
    runs-on: ubuntu-latest
    # Chỉ chạy trên fork (không chạy trên repo gốc)
    if: github.repository != 'Hoanq1003/FormDangky'

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Fetch và merge từ upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Thêm upstream
          git remote add upstream https://github.com/Hoanq1003/FormDangky.git || true
          
          # Fetch upstream
          git fetch upstream main
          
          # Kiểm tra có gì mới không
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          
          if [ "$BEHIND" -gt 0 ]; then
            echo "🔄 Có $BEHIND commit mới từ bản gốc. Đang cập nhật..."
            git merge upstream/main --no-edit --allow-unrelated-histories || {
              echo "⚠️ Có xung đột, dùng upstream version"
              git checkout --theirs .
              git add .
              git commit -m "🔄 Auto-sync: resolve conflicts with upstream" --no-edit
            }
            git push origin main
            echo "✅ Đã cập nhật thành công!"
          else
            echo "✅ Fork đã cập nhật rồi, không cần làm gì."
          fi
